<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Simple Calculator</title>
</head>
<body>
    <div class="page">
        <div class="calculator">
            <div class="calculator__screen">
                <div id="display" class="calculator__display">0</div>
                <input type="text" id="input" class="calculator__input" placeholder="Enter a number">
            </div>

            <div class="calculator__keys">
                <button class="key operator" onclick="calculateNum('+')">+</button>
                <button class="key operator" onclick="calculateNum('-')">-</button>
                <button class="key operator" onclick="calculateNum('*')">*</button>
                <button class="key operator" onclick="calculateNum('/')">/</button>
                <button class="key equal" onclick="equals()">=</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
