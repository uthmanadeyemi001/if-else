    <div class="container"><h1>YOU CAN CHECK YOUR ELIGIBILTY TO OWN  OR  DRIVE A CAR BY JUST CLICKING THE BUTTON</h1>
    <button onclick="ageCheck()" class="button">Check Eligibility</button></div>

    <script>
        function ageCheck() {
    let age = prompt("please enter your age");
    if(age>=18){
        alert("you are eligible to drive ")
    }else{
        let remainingYears = 18 - age;
        
        alert(`you cannot drive yet,you still have about ${remainingYears} years remaining to turn 18😒😒.`)
    }
    
    
}
    </script>
