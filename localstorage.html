<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>local storage</title>
</head>
<body>
    <h1>local storage

    </h1>
    <h2>hello , <span id="username"></span>   this is localstorage lesson </h2>
</body>
</html>
<script>
    let myName =  "Ade"
 localStorage.setItem("username",myName)

 let retrievedName =    localStorage.getItem("username")

 console.log(retrievedName);
 
 document.getElementById("username").innerText = localStorage.getItem("username");
 

 let animal ="dog"
 localStorage.setItem("animal",animal)
let myAnimal = localStorage.getItem("animal")
localStorage.removeItem("animal")
console.log(myAnimal);


let myArr = [ 1," apple","ball",4,5,6]
localStorage.setItem("myArr",JSON.stringify(myArr))
console.log(JSON.parse(localStorage.getItem("myArr")));



</script>
